<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai là triệu phú: Bài 52 Chuyển động nhìn thấy - KHTN 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #020617; 
            color: white; 
            overflow-x: hidden;
            height: 100vh;
        }

        /* Hiệu ứng lửa bùng cháy */
        .fire-bg {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; opacity: 0.4;
        }
        .fire-particle {
            position: absolute; bottom: -50px; background: linear-gradient(to top, #ff4500, #ff8c00, #ffff00);
            width: 15px; height: 15px; border-radius: 50% 50% 20% 50%;
            filter: blur(4px); animation: rise 3s infinite ease-out; transform: rotate(-45deg);
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1) rotate(-45deg); opacity: 1; }
            100% { transform: translateY(-110vh) scale(0.2) rotate(-45deg); opacity: 0; }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
        }

        .help-btn {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid #f59e0b;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; font-weight: bold; font-size: 14px; color: #f59e0b;
            background: rgba(0,0,0,0.3);
        }
        .help-btn:hover { background: #f59e0b; color: #000; transform: scale(1.1); }
        .help-btn.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }

        .option-btn {
            background: linear-gradient(to right, #1e293b, #0f172a); border: 2px solid #334155;
            padding: 1.2rem; border-radius: 35px; cursor: pointer; transition: 0.2s; text-align: left;
            display: flex; align-items: center;
        }
        .option-btn:hover:not(.disabled) { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .option-btn.selected { background: #f59e0b !important; color: #000 !important; border-color: #f59e0b !important; font-weight: 900; }
        .option-btn.hidden { visibility: hidden; pointer-events: none; }

        #wish-screen {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .scratch-card {
            background: #fff; width: 280px; height: 150px; border-radius: 15px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="fire-container" class="fire-bg"></div>

    <!-- Âm thanh -->
    <audio id="s-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="s-lose" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>

    <!-- Màn hình lời chúc rực lửa -->
    <div id="wish-screen">
        <div id="wish-fire-container" class="fire-bg" style="opacity: 0.9;"></div>
        <h1 class="text-6xl md:text-8xl font-black text-yellow-500 italic text-center animate-pulse tracking-tighter">
            CHÚC BẠN<br>THI TỐT!
        </h1>
        <div class="mt-10 flex gap-4">
             <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce"></div>
             <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
             <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
        </div>
    </div>

    <!-- Modal Thông báo & Giải thích kiến thức -->
    <div id="modal-overlay">
        <div class="glass-panel p-8 max-w-lg w-full text-center border-yellow-500/50 border-2">
            <h3 id="m-title" class="text-2xl font-black text-yellow-500 mb-4 uppercase italic"></h3>
            <div id="m-status-icon" class="text-5xl mb-4"></div>
            <div id="m-body" class="text-lg mb-8 text-slate-200 leading-relaxed"></div>
            <button onclick="handleModalAction()" id="m-btn" class="w-full bg-yellow-600 py-4 rounded-xl font-black hover:bg-yellow-500 transition-all uppercase">Tiếp tục</button>
        </div>
    </div>

    <div class="relative z-10 w-full min-h-screen flex flex-col items-center py-6 px-4">
        
        <!-- ĐĂNG NHẬP -->
        <div id="login-screen" class="glass-panel p-8 w-full max-w-md text-center mt-10 shadow-2xl">
            <div class="text-6xl mb-4">☀️</div>
            <h1 class="text-3xl font-black mb-1 uppercase text-yellow-500">Ai là triệu phú</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-10 italic">Bài 52: Chuyển động của Mặt Trời</p>
            
            <div class="space-y-4 text-left">
                <input type="text" id="in-sbd" placeholder="SỐ BÁO DANH" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none">
                <input type="text" id="in-name" placeholder="HỌ VÀ TÊN" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="in-class" placeholder="LỚP" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none">
                    <input type="text" id="in-school" placeholder="TRƯỜNG" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none">
                </div>
                <button onclick="startSequence()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-black py-5 rounded-2xl shadow-xl mt-6 transition-all active:scale-95 text-xl">
                    VÀO NGỒI GHẾ NÓNG
                </button>
            </div>
        </div>

        <!-- CHƠI GAME -->
        <div id="game-screen" class="hidden w-full max-w-4xl space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 glass-panel p-4 border-white/5">
                <div class="flex flex-col">
                    <span id="p-name" class="text-yellow-500 font-black text-lg"></span>
                    <span id="p-school" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest"></span>
                </div>
                <div class="flex gap-3">
                    <div id="h-5050" onclick="help5050()" class="help-btn" title="Loại bỏ 2 phương án sai">50:50</div>
                    <div id="h-aud" onclick="helpAudience()" class="help-btn" title="Hỏi ý kiến khán giả">👥</div>
                    <div id="h-call" onclick="helpCall()" class="help-btn" title="Gọi điện cho phụ huynh">📞</div>
                </div>
                <div class="bg-yellow-600 text-black px-5 py-1 rounded-full font-black text-xl" id="q-idx">1/20</div>
            </div>

            <div class="glass-panel p-8 md:p-14 shadow-inner relative overflow-hidden">
                <h2 id="q-text" class="text-2xl md:text-3xl font-black mb-12 text-center leading-relaxed italic"></h2>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>

            <button onclick="checkAnswer()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-3xl font-black text-3xl shadow-2xl transition-all">CHỐT ĐÁP ÁN</button>
        </div>

        <!-- KẾT QUẢ -->
        <div id="result-screen" class="hidden glass-panel p-10 w-full max-w-md text-center border-blue-500/30">
            <h2 class="text-4xl font-black text-blue-500 mb-8 italic uppercase tracking-widest">KẾT THÚC</h2>
            <div class="scratch-card mx-auto mb-8 shadow-2xl">
                <div id="scratch-off" onclick="this.style.opacity=0; setTimeout(()=>this.remove(),600)" class="absolute inset-0 bg-slate-500 flex flex-col items-center justify-center cursor-pointer z-10 transition-opacity duration-700">
                    <span class="text-slate-900 font-black text-xl">CÀO ĐỂ XEM ĐIỂM</span>
                </div>
                <div class="text-slate-900">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Điểm số đạt được</p>
                    <h3 id="f-score" class="text-8xl font-black text-blue-800">0</h3>
                </div>
            </div>
            <p id="f-desc" class="text-slate-300 font-medium mb-10 italic"></p>
            <button onclick="location.reload()" class="w-full py-5 bg-slate-800 hover:bg-slate-700 rounded-2xl font-black text-xl transition-all uppercase">Chơi lại</button>
        </div>
    </div>

    <script>
        const quizData = [
            // BIẾT (1-5)
            { q: "Hàng ngày, chúng ta quan sát thấy Mặt Trời mọc ở hướng nào?", a: ["Hướng Tây", "Hướng Đông", "Hướng Nam", "Hướng Bắc"], c: 1, e: "Mặt Trời luôn mọc ở hướng Đông và lặn ở hướng Tây do chiều tự quay của Trái Đất.", h: "Hướng này đối lập với hướng lặn." },
            { q: "Mặt Trời lặn ở hướng nào?", a: ["Hướng Đông", "Hướng Tây", "Hướng Bắc", "Hướng Nam"], c: 1, e: "Sau khi đi ngang qua bầu trời, Mặt Trời sẽ kết thúc hành trình nhìn thấy ở phía Tây.", h: "Hãy nhớ câu 'Mọc Đông lặn Tây'." },
            { q: "Thời điểm nào trong ngày Mặt Trời ở vị trí cao nhất trên bầu trời?", a: ["Lúc sáng sớm", "Lúc chiều tà", "Lúc giữa trưa", "Lúc nửa đêm"], c: 2, e: "Vào khoảng giữa trưa (12h), Mặt Trời nằm ở vị trí cao nhất so với đường chân trời.", h: "Lúc này bóng của các vật thường ngắn nhất." },
            { q: "Mặt Trời được gọi là một?", a: ["Hành tinh", "Vệ tinh", "Ngôi sao", "Tiểu hành tinh"], c: 2, e: "Mặt Trời là một ngôi sao tự phát ra ánh sáng và nhiệt, nằm ở trung tâm Hệ Mặt Trời.", h: "Nó là thiên thể duy nhất tự phát sáng trong hệ của chúng ta." },
            { q: "Thiên thể nào sau đây không tự phát sáng mà phản chiếu ánh sáng Mặt Trời?", a: ["Sao Bắc Cực", "Sao Si-ri-u-x", "Trái Đất", "Mặt Trời"], c: 2, e: "Hành tinh (như Trái Đất) và vệ tinh không tự phát sáng, chúng chỉ phản chiếu ánh sáng từ các ngôi sao.", h: "Ngôi sao mới là vật tự phát sáng." },

            // HIỂU (6-10)
            { q: "Chuyển động mọc và lặn của Mặt Trời được gọi là gì?", a: ["Chuyển động thực", "Chuyển động nhìn thấy", "Chuyển động tịnh tiến", "Chuyển động xoáy"], c: 1, e: "Đó là chuyển động 'nhìn thấy' vì thực tế Trái Đất quay chứ không phải Mặt Trời di chuyển quanh Trái Đất.", h: "Giống như khi bạn ngồi tàu hỏa thấy hàng cây chạy ngược lại." },
            { q: "Nguyên nhân chính gây ra hiện tượng ngày và đêm là gì?", a: ["Mặt Trời di chuyển quanh Trái Đất", "Trái Đất tự quay quanh trục của nó", "Trái Đất quay quanh Mặt Trời", "Mặt Trăng che khuất Mặt Trời"], c: 1, e: "Do Trái Đất có hình cầu và tự quay quanh trục từ Tây sang Đông, nên mỗi phần bề mặt lần lượt được chiếu sáng.", h: "Hãy tưởng tượng một quả bóng quay trước một ngọn đèn." },
            { q: "Trái Đất tự quay quanh trục theo chiều nào?", a: ["Từ Đông sang Tây", "Từ Tây sang Đông", "Từ Bắc xuống Nam", "Tùy theo mùa"], c: 1, e: "Trái Đất tự quay từ Tây sang Đông, chính vì thế ta mới thấy mọi thiên thể mọc từ hướng Đông.", h: "Ngược lại với hướng nhìn thấy của Mặt Trời." },
            { q: "Trái Đất mất khoảng bao lâu để hoàn thành một vòng tự quay quanh trục?", a: ["12 giờ", "24 giờ", "365 ngày", "1 tháng"], c: 1, e: "Trái Đất hoàn thành một vòng tự quay trong khoảng 24 giờ, tạo nên chu kỳ một ngày đêm.", h: "Đây là độ dài của một ngày dương lịch." },
            { q: "Tại sao chúng ta thấy Mặt Trời mọc ở hướng Đông và lặn ở hướng Tây?", a: ["Vì Mặt Trời quay quanh Trái Đất từ Đông sang Tây", "Vì Trái Đất quay quanh trục từ Tây sang Đông", "Vì Trái Đất nghiêng 23,5 độ", "Vì Mặt Trời tự quay"], c: 1, e: "Do Trái Đất quay từ Tây sang Đông, người đứng trên bề mặt sẽ thấy Mặt Trời xuất hiện ngược lại từ Đông sang Tây.", h: "Liên hệ với cảm giác khi bạn ngồi trên vòng quay mặt trời ở công viên." },

            // VẬN DỤNG (11-20)
            { q: "Khi quan sát từ Bắc Cực, Trái Đất quay quanh trục theo chiều nào?", a: ["Cùng chiều kim đồng hồ", "Ngược chiều kim đồng hồ", "Không quay", "Lúc xuôi lúc ngược"], c: 1, e: "Nhìn từ phía trên cực Bắc, Trái Đất quay ngược chiều kim đồng hồ.", h: "Đây là quy ước chung trong thiên văn học." },
            { q: "Một người ở Hà Nội thấy Mặt Trời mọc lúc 6:00 sáng. Một người ở phía Tây sẽ thấy Mặt Trời mọc?", a: ["Sớm hơn 6:00", "Muộn hơn 6:00", "Đúng 6:00", "Không bao giờ thấy"], c: 1, e: "Do Trái Đất quay từ Tây sang Đông, phía Đông sẽ đón ánh sáng Mặt Trời trước phía Tây.", h: "Các nước ở phía Đông thường có múi giờ sớm hơn." },
            { q: "Trong các thiên thể sau, thiên thể nào thuộc loại 'Sao'?", a: ["Kim tinh", "Mộc tinh", "Mặt Trời", "Mặt Trăng"], c: 2, e: "Trong danh sách này, chỉ có Mặt Trời là ngôi sao (tự phát sáng). Kim tinh và Mộc tinh là hành tinh.", h: "Sao là vật thể tự phát ra năng lượng ánh sáng." },
            { q: "Chuyển động nào sau đây là chuyển động thực?", a: ["Mặt Trời mọc hướng Đông", "Mặt Trời lặn hướng Tây", "Mặt Trời đứng yên, Trái Đất quay", "Các ngôi sao quay quanh Trái Đất"], c: 2, e: "Thực chất Mặt Trời là trung tâm, các hiện tượng mọc lặn chỉ là hệ quả của việc Trái Đất tự quay.", h: "Thực chất là Trái Đất di động." },
            { q: "Nếu Trái Đất ngừng quay quanh trục, hiện tượng nào sẽ xảy ra?", a: ["Vẫn có ngày đêm như cũ", "Một nửa Trái Đất sẽ là ngày vĩnh viễn", "Mặt Trời sẽ biến mất", "Trái Đất sẽ bay vào vũ trụ"], c: 1, e: "Nếu ngừng quay, phần hướng về Mặt Trời sẽ luôn là ngày, phần còn lại luôn là đêm (cho đến khi Trái Đất di chuyển đến phía bên kia của quỹ đạo quanh Mặt Trời).", h: "Sẽ không còn sự luân phiên ngày đêm 24h nữa." },
            { q: "Sự phân chia 'thiên thể' và 'hành tinh' dựa trên đặc điểm nào?", a: ["Kích thước", "Khả năng tự phát sáng", "Vị trí trong Hệ Mặt Trời", "Màu sắc"], c: 1, e: "Thiên thể là tên gọi chung. Sao tự phát sáng, hành tinh không tự phát sáng và quay quanh sao.", h: "Dựa vào bản chất phát sáng và quỹ đạo." },
            { q: "Người ta sử dụng hiện tượng mọc/lặn của Mặt Trời để làm gì trong đời sống?", a: ["Xác định khối lượng Trái Đất", "Xác định phương hướng", "Dự báo thời tiết chính xác 100%", "Đo khoảng cách đến Mặt Trăng"], c: 1, e: "Mặt Trời mọc hướng Đông giúp chúng ta xác định được các phương còn lại (Tây, Nam, Bắc).", h: "Đây là cách định hướng cổ xưa và cơ bản nhất." },
            { q: "Hiện tượng Nhật thực xảy ra khi nào?", a: ["Trái Đất nằm giữa Mặt Trời và Mặt Trăng", "Mặt Trăng nằm giữa Mặt Trời và Trái Đất", "Mặt Trời nằm giữa Trái Đất và Mặt Trăng", "Sao Kim che khuất Mặt Trời"], c: 1, e: "Khi Mặt Trăng đi vào giữa Mặt Trời và Trái Đất, bóng của Mặt Trăng đổ xuống Trái Đất che khuất Mặt Trời.", h: "Mặt Trăng đóng vai trò là vật cản ánh sáng." },
            { q: "Thiên thể nào gần Trái Đất nhất?", a: ["Mặt Trời", "Sao Kim", "Mặt Trăng", "Sao Hỏa"], c: 2, e: "Mặt Trăng là vệ tinh tự nhiên duy nhất và là thiên thể gần Trái Đất nhất (khoảng 384.400 km).", h: "Khoảng cách này gần hơn rất nhiều so với Mặt Trời (150 triệu km)." },
            { q: "Tại sao chúng ta không thấy các ngôi sao khác vào ban ngày?", a: ["Vì chúng lặn mất", "Vì ánh sáng Mặt Trời quá mạnh làm lu mờ chúng", "Vì chúng ngừng phát sáng", "Vì mây che khuất"], c: 1, e: "Các ngôi sao vẫn ở đó, nhưng bầu khí quyển Trái Đất tán xạ ánh sáng Mặt Trời quá mạnh khiến ta không thể nhìn thấy các nguồn sáng yếu hơn từ các vì sao xa xôi.", h: "Tương tự như khi bạn bật đèn pin giữa trời nắng gắt." }
        ];

        let currentIdx = 0;
        let selectedIdx = null;
        let usedHelps = { h50: false, aud: false, call: false };
        let currentModalState = "explanation"; 

        function createFire(containerId, count) {
            const container = document.getElementById(containerId);
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'fire-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 3 + 's';
                p.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(p);
            }
        }

        function startSequence() {
            const sbd = document.getElementById('in-sbd').value.trim();
            const name = document.getElementById('in-name').value.trim();
            const cls = document.getElementById('in-class').value.trim();
            const sch = document.getElementById('in-school').value.trim();

            if(!sbd || !name || !cls || !sch) return alert("Vui lòng nhập đủ thông tin!");
            localStorage.setItem('user_sbd_52', JSON.stringify({sbd, name, cls, sch}));
            
            document.getElementById('login-screen').classList.add('hidden');
            const wish = document.getElementById('wish-screen');
            wish.style.display = 'flex';
            createFire('wish-fire-container', 45);

            setTimeout(() => {
                wish.style.display = 'none';
                document.getElementById('game-screen').classList.remove('hidden');
                initGame(sbd, name, cls, sch);
            }, 3000);
        }

        function initGame(sbd, name, cls, sch) {
            document.getElementById('p-name').innerText = `${name} (${cls})`;
            document.getElementById('p-school').innerText = sch;
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('q-idx').innerText = `${currentIdx + 1}/20`;
            document.getElementById('q-text').innerText = data.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            selectedIdx = null;

            data.a.forEach((txt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.id = `opt-${i}`;
                btn.innerHTML = `<span class="bg-yellow-600 text-black w-8 h-8 flex items-center justify-center rounded-full font-black mr-4 text-sm">${String.fromCharCode(65+i)}</span> <span>${txt}</span>`;
                btn.onclick = () => {
                    document.getElementById('s-click').play();
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedIdx = i;
                };
                grid.appendChild(btn);
            });
            window.scrollTo(0,0);
        }

        function help5050() {
            if(usedHelps.h50) return;
            usedHelps.h50 = true;
            document.getElementById('h-5050').classList.add('used');
            const correct = quizData[currentIdx].c;
            const wrongs = [0,1,2,3].filter(i => i !== correct).sort(() => Math.random() - 0.5);
            document.getElementById(`opt-${wrongs[0]}`).classList.add('hidden');
            document.getElementById(`opt-${wrongs[1]}`).classList.add('hidden');
        }

        function helpAudience() {
            if(usedHelps.aud) return;
            usedHelps.aud = true;
            document.getElementById('h-aud').classList.add('used');
            const correct = quizData[currentIdx].c;
            let vals = [5, 5, 5, 5];
            vals[correct] = 75 + Math.floor(Math.random() * 10);
            let rem = 100 - vals[correct];
            [0,1,2,3].forEach(i => { if(i !== correct) { let v = Math.floor(Math.random() * rem); vals[i] += v; rem -= v; }});
            vals[0] += rem;
            let html = '<div class="space-y-4 mt-4">';
            vals.forEach((v, i) => { html += `<div class="text-left font-bold">${String.fromCharCode(65+i)}: ${v}% <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div class="bg-yellow-500 h-full" style="width:${v}%"></div></div></div>`; });
            html += '</div>';
            currentModalState = "help";
            showModal("Khán giả bình chọn", html, "👥", "Đóng");
        }

        function helpCall() {
            if(usedHelps.call) return;
            usedHelps.call = true;
            document.getElementById('h-call').classList.add('used');
            const data = quizData[currentIdx];
            currentModalState = "help";
            showModal("Gọi cho người thân", `Phụ huynh: "Ba mẹ đã tìm hiểu rồi, câu này đáp án là <b>${String.fromCharCode(65+data.c)}</b>. ${data.h} Con tự tin chốt nhé!"`, "📞", "Đóng");
        }

        function showModal(title, body, icon = "", btnText = "Tiếp tục") {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-status-icon').innerHTML = icon;
            document.getElementById('m-body').innerHTML = body;
            document.getElementById('m-btn').innerText = btnText;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function handleModalAction() {
            document.getElementById('modal-overlay').style.display = 'none';
            if(currentModalState === "explanation") {
                if(currentIdx < quizData.length) loadQuestion();
                else finishGame();
            } else if (currentModalState === "end") {
                finishGame();
            }
        }

        function checkAnswer() {
            if(selectedIdx === null) return;
            const data = quizData[currentIdx];
            currentModalState = "explanation";
            
            if(selectedIdx === data.c) {
                document.getElementById('s-win').play();
                currentIdx++;
                showModal("Chính xác!", `<b>Đáp án đúng: ${String.fromCharCode(65+data.c)}</b><br><br>${data.e}`, "✅", "Câu tiếp theo");
            } else {
                document.getElementById('s-lose').play();
                const scoreSnapshot = currentIdx;
                currentIdx = 999; 
                showModal("Chưa chính xác!", `Bạn chọn ${String.fromCharCode(65+selectedIdx)} là sai.<br><b>Đáp án đúng là: ${String.fromCharCode(65+data.c)}</b><br><br>${data.e}`, "❌", "Xem điểm số");
                currentIdx = scoreSnapshot;
                currentModalState = "end";
            }
        }

        function finishGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const score = (currentIdx / 20 * 10).toFixed(1);
            document.getElementById('f-score').innerText = score;
            document.getElementById('f-desc').innerText = `Chúc mừng bạn đã trả lời đúng ${currentIdx}/20 câu hỏi về Chuyển động của Mặt Trời!`;
        }

        window.onload = () => {
            createFire('fire-container', 30);
            const saved = localStorage.getItem('user_sbd_52');
            if(saved) {
                const u = JSON.parse(saved);
                document.getElementById('in-sbd').value = u.sbd;
                document.getElementById('in-name').value = u.name;
                document.getElementById('in-class').value = u.cls;
                document.getElementById('in-school').value = u.sch;
            }
        };
    </script>
</body>
</html>
